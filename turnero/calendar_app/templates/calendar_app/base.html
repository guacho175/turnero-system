<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <title>{% block title %}Turnero{% endblock %}</title>

  <style>
    :root {
      --bg: #f0fdf4;
      --card: #ffffff;
      --primary: #16a34a;
      --primary-hover: #15803d;
      --header-bg: #dcfce7;
      --header-border: #86efac;
      --text: #0f172a;
      --muted: #64748b;
      --border: #bbf7d0;
      --shadow: rgba(0, 120, 0, 0.12);
    }

    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .row { display:flex; gap:12px; margin-top:10px; flex-wrap:nowrap; }
    .row-wrap { display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
    #weekdays { display:flex; gap:8px; flex-wrap:nowrap; align-items:center; }
    #weekdays .pill { white-space:nowrap; }


    /* Header (estilo común) */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-home {
      font-size: 22px;
      text-decoration: none;
      line-height: 1;
    }

    .header-title {
      font-weight: 700;
      color: #15803d;
    }

    .header-btn {
      background: var(--primary);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .header-btn:hover { background: var(--primary-hover); }

    /* Layout */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 10px 28px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 25px var(--shadow);
    }

    .muted { color: var(--muted); font-size: 12px; }

    /* Inputs básicos */
    label { display:block; font-weight: 600; margin-top: 10px; }
    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--primary-hover); }

  </style>

  {% block extra_head %}{% endblock %}
</head>

<body>

  {% include "calendar_app/components/header.html" %}

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
